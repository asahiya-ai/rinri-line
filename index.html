<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コケコッコーまとめ 🐔 倫理LINE</title>
  <style>
    :root {
      --primary: #E8820C;
      --primary-light: #F5A335;
      --bg: #FFF8EC;
      --card: #FFFFFF;
      --text: #333333;
      --text-light: #777777;
      --border: #E5D9C0;
      --shadow: 0 2px 10px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'メイリオ', 'Yu Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 48px;
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      text-align: center;
      padding: 22px 16px;
      box-shadow: var(--shadow);
    }
    header h1 { font-size: 1.45rem; font-weight: bold; letter-spacing: 0.03em; }
    header p  { font-size: 0.82rem; opacity: 0.88; margin-top: 5px; }

    .container { max-width: 580px; margin: 0 auto; padding: 16px; }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 0.88rem;
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: bold;
      color: var(--text-light);
      margin-bottom: 5px;
    }

    input[type="date"],
    input[type="number"],
    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 9px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      margin-bottom: 13px;
      background: #FAFAFA;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
    }

    .venue-display {
      padding: 10px 12px;
      background: #F2F2F2;
      border-radius: 9px;
      font-size: 0.92rem;
      color: var(--text-light);
      margin-bottom: 13px;
    }

    .speaker-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .speaker-row input { flex: 1; margin-bottom: 0; }
    .speaker-suffix { font-size: 0.88rem; color: var(--text-light); white-space: nowrap; }
    .btn-remove {
      background: none;
      border: none;
      color: #CCCCCC;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 2px 6px;
      line-height: 1;
      transition: color 0.15s;
    }
    .btn-remove:hover { color: #EE4444; }

    .btn-add {
      background: none;
      border: 2px dashed var(--border);
      color: var(--text-light);
      border-radius: 9px;
      padding: 9px;
      font-size: 0.85rem;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-add:hover { border-color: var(--primary); color: var(--primary); }

    .char-limit-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }
    .char-limit-row input[type="number"] { width: 90px; margin-bottom: 0; text-align: center; }
    .char-hint { font-size: 0.78rem; color: var(--text-light); margin-bottom: 14px; }

    textarea { resize: vertical; min-height: 130px; }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      border-radius: 11px;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 10px rgba(232, 130, 12, 0.28);
      font-family: inherit;
    }
    .btn-primary:hover  { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-secondary {
      background: white;
      color: var(--primary);
      border: 2px solid var(--primary);
      border-radius: 9px;
      padding: 9px 18px;
      font-size: 0.88rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-secondary:hover { background: var(--primary); color: white; }

    .btn-save {
      background: linear-gradient(135deg, #3DAA50, #52C46A);
      color: white;
      border: none;
      border-radius: 11px;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 10px rgba(61, 170, 80, 0.28);
      font-family: inherit;
    }
    .btn-save:hover  { opacity: 0.88; }
    .btn-save:active { transform: scale(0.98); }
    .btn-save:disabled { opacity: 0.55; cursor: not-allowed; }

    .preview-area {
      width: 100%;
      background: #F0F7FF;
      border: 2px solid #B8D8F8;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.92rem;
      line-height: 1.7;
      font-family: inherit;
      resize: vertical;
      min-height: 220px;
    }
    .preview-actions { display: flex; justify-content: flex-end; margin-top: 10px; }

    .status {
      text-align: center;
      padding: 11px 14px;
      border-radius: 9px;
      font-size: 0.88rem;
      margin-top: 10px;
      display: none;
    }
    .status.loading { background: #FFF3CD; color: #7A5E00; display: block; }
    .status.success { background: #D4EDDA; color: #1B5E2E; display: block; }
    .status.error   { background: #FDECEA; color: #7B1D1A; display: block; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #previewSection { display: none; }
    #saveSection    { display: none; }
  </style>
</head>
<body>

<header>
  <h1>🐔 コケコッコーまとめ</h1>
  <p>倫理法人会 モーニングセミナー LINE自動まとめ</p>
</header>

<div class="container">

  <!-- セミナー情報 -->
  <div class="card">
    <div class="card-title">📅 セミナー情報</div>

    <label>参加日</label>
    <input type="date" id="seminarDate">

    <label>会場</label>
    <div class="venue-display">📍 佐世保（固定）</div>

    <label>参加者数</label>
    <input type="number" id="attendees" placeholder="例: 15" min="1">
  </div>

  <!-- 講話者 -->
  <div class="card">
    <div class="card-title">🎤 講話者</div>
    <div id="speakerList">
      <div class="speaker-row">
        <input type="text" class="speaker-input" placeholder="お名前（例：田中）">
        <span class="speaker-suffix">さん</span>
        <button class="btn-remove" onclick="removeSpeaker(this)" title="削除">×</button>
      </div>
    </div>
    <button class="btn-add" onclick="addSpeaker()">＋ 講話者を追加</button>
  </div>

  <!-- 文字起こし・要約 -->
  <div class="card">
    <div class="card-title">📝 文字起こし＆要約</div>

    <label>文字起こしテキスト</label>
    <textarea id="transcription" style="min-height: 180px;" placeholder="ここに文字起こしテキストを貼り付けてください…"></textarea>

    <label>要約文字数（1人あたり）</label>
    <div class="char-limit-row">
      <input type="number" id="charLimit" value="150" min="50" max="500">
      <span style="font-size:0.85rem; color:var(--text-light);">文字</span>
    </div>
    <p class="char-hint">💡 1人あたり150文字が目安です</p>

    <button class="btn-primary" onclick="summarize()" id="summarizeBtn">🐔 要約する</button>
    <div class="status" id="summarizeStatus"></div>
  </div>

  <!-- プレビュー・編集 -->
  <div class="card" id="previewSection">
    <div class="card-title">👁️ プレビュー・編集</div>
    <textarea class="preview-area" id="previewText"></textarea>
    <div class="preview-actions">
      <button class="btn-secondary" onclick="copyToClipboard()">📋 コピー</button>
    </div>
  </div>

  <!-- 保存 -->
  <div class="card" id="saveSection">
    <div class="card-title">💾 保存</div>
    <label>メモ（任意）</label>
    <input type="text" id="memo" placeholder="例：雨天、特別ゲストあり など">
    <button class="btn-save" onclick="saveData()" id="saveBtn">✅ 保存する</button>
    <div class="status" id="saveStatus"></div>
  </div>

</div><!-- /container -->

<script>
  // ★ GASをデプロイ後にこのURLを書き換えてください
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxwR2xQUquQhWhfKtHIOS3SxOiIkK-NJDewwS356ODyS1NGR7an80am8mArJv0viv0o/exec';

  // 今日の日付をデフォルトセット
  window.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    document.getElementById('seminarDate').value = today.toISOString().split('T')[0];
  });

  // ─── 講話者 追加 ───
  function addSpeaker() {
    const list = document.getElementById('speakerList');
    const row = document.createElement('div');
    row.className = 'speaker-row';
    row.innerHTML = `
      <input type="text" class="speaker-input" placeholder="お名前（例：田中）">
      <span class="speaker-suffix">さん</span>
      <button class="btn-remove" onclick="removeSpeaker(this)" title="削除">×</button>`;
    list.appendChild(row);
    row.querySelector('input').focus();
  }

  // ─── 講話者 削除 ───
  function removeSpeaker(btn) {
    if (document.querySelectorAll('.speaker-row').length <= 1) {
      alert('講話者は1人以上必要です');
      return;
    }
    btn.closest('.speaker-row').remove();
  }

  // ─── 要約する ───
  async function summarize() {
    const date        = document.getElementById('seminarDate').value;
    const attendees   = document.getElementById('attendees').value;
    const transcription = document.getElementById('transcription').value.trim();
    const charLimit   = parseInt(document.getElementById('charLimit').value) || 150;
    const speakers    = getSpeakers();

    if (!date)               { alert('参加日を入力してください'); return; }
    if (!attendees)          { alert('参加者数を入力してください'); return; }
    if (speakers.length === 0) { alert('講話者名を入力してください'); return; }
    if (!transcription)      { alert('文字起こしテキストを貼り付けてください'); return; }
    if (GAS_URL === 'YOUR_GAS_WEB_APP_URL') {
      alert('GASのURLが設定されていません。\nindex.html の GAS_URL を書き換えてください。');
      return;
    }

    setStatus('summarizeStatus', 'loading', '🐔 要約中です…少々お待ちください');
    document.getElementById('summarizeBtn').disabled = true;

    try {
      const result = await callGAS({ action: 'summarize', speakers, transcription, charLimit });
      if (result.error) throw new Error(result.error);

      const lineText = buildLineMessage(date, attendees, speakers, result.summaries);
      document.getElementById('previewText').value = lineText;
      document.getElementById('previewSection').style.display = 'block';
      document.getElementById('saveSection').style.display = 'block';

      setStatus('summarizeStatus', 'success', '✅ 要約完了！プレビューを確認・編集してください');
      document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth' });

    } catch (err) {
      setStatus('summarizeStatus', 'error', '❌ エラーが発生しました: ' + err.message);
    } finally {
      document.getElementById('summarizeBtn').disabled = false;
    }
  }

  // ─── LINE文章を組み立て ───
  function buildLineMessage(date, attendees, speakers, summaries) {
    let blocks = '';
    speakers.forEach((name, i) => {
      const summary = (summaries && summaries[i]) ? summaries[i] : '（要約なし）';
      blocks += `${summary}\n\n`;
    });

    return `コケコッコーー！\nおはようございます♪🐔\n\n明日金曜日はモーニングセミナーだよ！\n先週はこんな話があったよ✨\n\n${blocks.trim()}\n\n毎週金曜の朝はね、\n仕事にも人生にも使えるヒントと\n素敵な仲間との出会いが待ってるよ！☀️\n\nきっと「来てよかった！」って思える朝になるから\nぜひ一緒に過ごしましょ💛\n\n先週の参加者は${attendees}名！みんなありがとう🎉\n今週もあなたの笑顔に会えたら嬉しいな✨\n\n一緒に最高の朝をスタートしよう🐔✨`;
  }

  // ─── コピー ───
  function copyToClipboard() {
    const text = document.getElementById('previewText').value;
    navigator.clipboard.writeText(text)
      .then(() => alert('📋 コピーしました！LINEに貼り付けてください'))
      .catch(() => {
        const ta = document.getElementById('previewText');
        ta.select();
        document.execCommand('copy');
        alert('📋 コピーしました！');
      });
  }

  // ─── 保存する ───
  async function saveData() {
    if (!confirm('📝 本当に保存しますか？\nGoogleスプレッドシートに記録されます。')) return;

    const date      = document.getElementById('seminarDate').value;
    const attendees = document.getElementById('attendees').value;
    const memo      = document.getElementById('memo').value.trim();
    const lineText  = document.getElementById('previewText').value;
    const speakers  = getSpeakers();

    setStatus('saveStatus', 'loading', '💾 保存中です…');
    document.getElementById('saveBtn').disabled = true;

    try {
      const result = await callGAS({ action: 'save', date, venue: '佐世保', attendees, speakers, lineText, memo });
      if (result.error) throw new Error(result.error);
      setStatus('saveStatus', 'success', '✅ 保存完了！スプレッドシートに記録しました🎉');
    } catch (err) {
      setStatus('saveStatus', 'error', '❌ 保存エラー: ' + err.message);
      document.getElementById('saveBtn').disabled = false;
    }
  }

  // ─── 共通: GAS呼び出し ───
  async function callGAS(payload) {
    const params = new URLSearchParams();
    params.append('data', JSON.stringify(payload));
    const res = await fetch(GAS_URL, { method: 'POST', body: params });
    if (!res.ok) throw new Error('通信エラー (HTTP ' + res.status + ')');
    return res.json();
  }

  // ─── 講話者名を取得 ───
  function getSpeakers() {
    return Array.from(document.querySelectorAll('.speaker-input'))
      .map(i => i.value.trim())
      .filter(v => v);
  }

  // ─── ステータス表示 ───
  function setStatus(id, type, message) {
    const el = document.getElementById(id);
    el.className = 'status ' + type;
    el.innerHTML = type === 'loading' ? `<span class="spinner"></span>${message}` : message;
  }
</script>

</body>
</html>
